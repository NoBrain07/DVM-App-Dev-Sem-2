<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    
    <title>Fest Organiser</title>
  </head>
  <body>
    
    <div class="wrapper">
      
      <header>
        <h1>Fest Explorer</h1>
        <p>15 Events, 3 Days</p>
      </header>
      

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total Events</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Most Popular Category</div>
          <div class="stat-value" id="statPopular">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Registrations</div>
          <div class="stat-value" id="statRegs">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Saved in Lineup</div>
          <div class="stat-value" id="statSaved">0</div>
        </div>
      </div>
      
      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search events..." />
        
        <div class="filter-sort-row">
          <div id="filterGroup"></div>
          <select id="sortSelect">
            <option value="default">Sort by...</option>
            <option value="day-asc">Day (ascending)</option>
            <option value="day-desc">Day (descending)</option>
            <option value="regs-desc">Registrations (descending)</option>
            <option value="regs-asc">Registrations (ascending)</option>
          </select>
        </div>
      </div>
      

      <div class="main-layout">

        <div>
          <div class="section-header">
            Events — <span id="countBadge">15</span> shown
          </div>
          <div id="eventsGrid"></div>
          <div id="noResults">No events match your search.</div>
        </div>

        <div>
          <div class="section-header">My Lineup</div>
          <div class="lineup-panel">
            <div id="lineupList"></div>
          </div>
        </div>
        
      </div>
    </div>
    
      <script type="module" src="script.js"></script>
  </body>
  </html>
