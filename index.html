<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">   
    <!-- to link css style to the page -->
    <title>Events Explorer</title>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Fest Events Explorer</h1>
        </header>

        <div class = "controls">

            <div class="search">
                <input type="text" id="search-bar" placeholder="Search...">
            </div>
            <div class="filter-sort">
                
                <div id = "filter-groups"></div>

                <div class="sort-by">
                    <select name="sort-by-selected" id="sort-by-selected">
                        <option value="default">Sort By...</option>
                        <option value="day-asc">Day Ascending</option>
                        <option value="reg-desc">Registrations Descending</option>
                    </select>
                </div>
            </div>
            
            
        </div>

        <div class="main-structure">
            <div>
                <div class = "main-heading">
                    <span id = "event-count">n</span> EVENTS
                </div>
                <div id = "events-grid"></div>
                <div id = "no-results">No Results found</div>
            </div>
            
            <div>
                <div class = "main-heading">
                    <span id = "lineup-count">x</span> EVENTS ADDED TO LINEUP
                </div>
                <div class="lineup">
                    <div id = "lineup-grid"></div>
                    <div id = "empty-lineup"></div>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
